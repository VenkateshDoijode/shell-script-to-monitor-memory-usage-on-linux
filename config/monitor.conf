# =============================================================================
# monitor.conf — Configuration for devops-monitor
# Edit this file to customise thresholds, alerts, and behaviour.
# =============================================================================

# ── Thresholds ────────────────────────────────────────────────────────────────
# Percentage at which alerts are triggered
CPU_THRESHOLD=80
MEM_THRESHOLD=85

# ── Monitoring interval ───────────────────────────────────────────────────────
# Seconds between each metrics collection
INTERVAL=5

# ── Logging ───────────────────────────────────────────────────────────────────
# Directory where log files are written (relative or absolute path)
LOG_DIR="./logs"

# Number of days to keep log files before auto-deletion
MAX_LOG_DAYS=7

# ── Email alerts ──────────────────────────────────────────────────────────────
# Leave empty to disable email alerts
# Requires 'mail' or 'sendmail' to be configured on the system
ALERT_EMAIL=""
# Example: ALERT_EMAIL="devops@yourcompany.com"

# ── Slack alerts ─────────────────────────────────────────────────────────────
# Paste your Slack Incoming Webhook URL here (leave empty to disable)
SLACK_WEBHOOK=""
# Example: SLACK_WEBHOOK="https://hooks.slack.com/services/XXX/YYY/ZZZ"
